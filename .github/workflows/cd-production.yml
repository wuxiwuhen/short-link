name: CD - Production

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      confirm:
        description: "Type 'DEPLOY' to confirm production deployment"
        required: true
        type: string

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull staging image and retag for production
        run: |
          docker pull ghcr.io/${{ github.repository }}:staging
          docker tag ghcr.io/${{ github.repository }}:staging \
            ghcr.io/${{ github.repository }}:production
          docker push ghcr.io/${{ github.repository }}:production

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          git tag -a "release-${TIMESTAMP}" -m "Production release ${TIMESTAMP}"
          git push origin "release-${TIMESTAMP}"

      - name: Deploy notification
        run: |
          echo "🎉 Production deployment completed"
          echo "Image: ghcr.io/${{ github.repository }}:production"
          echo ""
          echo "In a real project, this step would:"
          echo "  - Deploy to production server/k8s"
          echo "  - Run health checks"
          echo "  - Monitor error rates"
          echo "  - Auto-rollback if health check fails"
